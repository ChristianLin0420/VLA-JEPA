<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="470" viewBox="0 0 1400 470" role="img" aria-labelledby="title">
  <title id="title">Retro-JEPA Stage M1: memory pretraining on actionless video</title>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="8" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333333"/>
    </marker>
    <style>
      .mod   { font: 700 17px Helvetica, Arial, sans-serif; fill: #1B2A3A; text-anchor: middle; }
      .sub   { font: 400 13px Helvetica, Arial, sans-serif; fill: #5B6573; text-anchor: middle; }
      .mathm { font: italic 600 16px Georgia, 'Times New Roman', serif; fill: #1B2A3A; text-anchor: middle; }
      .loss  { font: italic 700 16px Georgia, 'Times New Roman', serif; fill: #B4531B; }
      .note  { font: 400 13px Helvetica, Arial, sans-serif; fill: #5B6573; }
      .cap   { font: 700 15px Helvetica, Arial, sans-serif; fill: #1B2A3A; }
      .frozen    { fill: #F0F3F7; stroke: #6B7A8D; stroke-width: 1.4; }
      .trainable { fill: #FDEBD7; stroke: #C87B2E; stroke-width: 1.4; }
      .flow  { fill: none; stroke: #333333; stroke-width: 1.6; marker-end: url(#ah); }
      .sg    { fill: none; stroke: #6B7A8D; stroke-width: 1.4; stroke-dasharray: 5 4; marker-end: url(#ah); }
      .tokv  { fill: #DCE9F5; stroke: #6B7A8D; stroke-width: 1; }
      .tokm  { fill: #E7EAEE; stroke: #6B7A8D; stroke-width: 1; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="470" fill="#FFFFFF"/>
  <text x="30" y="34" class="cap">Stage M1 &#183; memory pretraining on actionless video (SSv2 + DROID + robot corpora)</text>

  <!-- legend -->
  <rect x="1122" y="20" width="16" height="16" class="frozen"/>
  <text x="1146" y="33" class="note">frozen &#10052;</text>
  <rect x="1230" y="20" width="16" height="16" class="trainable"/>
  <text x="1254" y="33" class="note">trainable</text>

  <!-- input frames -->
  <rect x="40" y="122" width="96" height="70" rx="6" class="frozen" stroke-dasharray="0"/>
  <rect x="52" y="134" width="96" height="70" rx="6" class="frozen"/>
  <rect x="64" y="146" width="96" height="70" rx="6" fill="#FFFFFF" stroke="#6B7A8D" stroke-width="1.4"/>
  <text x="112" y="186" class="mathm">x&#8321;&#8230;x_T</text>
  <text x="112" y="240" class="sub">video frames</text>

  <path d="M164 180 H206" class="flow"/>

  <!-- encoder -->
  <rect x="206" y="140" width="150" height="80" rx="10" class="frozen"/>
  <text x="281" y="174" class="mod">Encoder &#10052;</text>
  <text x="281" y="198" class="sub">V-JEPA2 ViT-L</text>

  <path d="M356 180 H432" class="flow"/>
  <text x="394" y="168" class="mathm">z&#8321;&#8230;z_T</text>

  <!-- branch up to memory -->
  <path d="M410 180 V100 H452" class="flow"/>
  <text x="430" y="88" class="mathm">z&#772;_t</text>

  <!-- memory -->
  <rect x="452" y="60" width="212" height="80" rx="10" class="trainable"/>
  <text x="558" y="94" class="mod">Memory  W</text>
  <text x="558" y="118" class="sub">M_t = W(M_{t&#8722;1}, z&#772;_t) &#183; K=2 BPTT</text>
  <path d="M664 84 C 694 84 694 116 664 116" class="flow"/>

  <path d="M664 100 H900 V140" class="flow"/>
  <text x="790" y="88" class="mathm">R_t  (read tokens)</text>

  <!-- token row: retrodictor context -->
  <rect x="452" y="169" width="22" height="22" class="tokv"/>
  <rect x="479" y="169" width="22" height="22" class="tokm"/>
  <line x1="479" y1="191" x2="501" y2="169" stroke="#6B7A8D" stroke-width="1"/>
  <rect x="506" y="169" width="22" height="22" class="tokm"/>
  <line x1="506" y1="191" x2="528" y2="169" stroke="#6B7A8D" stroke-width="1"/>
  <rect x="533" y="169" width="22" height="22" class="tokv"/>
  <rect x="560" y="169" width="22" height="22" class="tokv"/>
  <rect x="587" y="169" width="22" height="22" class="tokm"/>
  <line x1="587" y1="191" x2="609" y2="169" stroke="#6B7A8D" stroke-width="1"/>
  <rect x="614" y="169" width="22" height="22" class="tokv"/>
  <rect x="641" y="169" width="22" height="22" class="tokv"/>
  <text x="580" y="222" class="sub">mask S: &#961; ~ U(0.3, 0.9), &#8805;1 memory-only target</text>
  <text x="580" y="241" class="sub">(hatched = mask token; slot keeps 3D-RoPE time)</text>

  <path d="M668 180 H776" class="flow"/>

  <!-- predictor -->
  <rect x="776" y="140" width="200" height="80" rx="10" class="trainable"/>
  <text x="876" y="174" class="mod">Predictor</text>
  <text x="876" y="198" class="sub">shared w/ world model &#183; bidir.</text>

  <path d="M976 180 H1044" class="flow"/>
  <text x="1010" y="168" class="mathm">z&#770;_i</text>

  <!-- sg targets path -->
  <path d="M410 180 V310 H1044" class="sg"/>
  <text x="700" y="300" class="note">sg(z_i)  &#8212;  frozen targets, no grad  &#10052;</text>

  <!-- L_retro -->
  <path d="M1052 192 V298" class="sg" marker-end="none"/>
  <text x="1068" y="238" class="loss">&#8466;_retro = &#8214;z&#770;_i &#8722; sg(z_i)&#8214;&#8321;</text>
  <text x="1070" y="260" class="note">L1 in latent space, fp32</text>

  <!-- L_pick -->
  <path d="M1044 190 V362 H1074" class="flow"/>
  <rect x="1080" y="352" width="20" height="20" class="tokv"/>
  <rect x="1106" y="352" width="20" height="20" class="tokm"/>
  <rect x="1132" y="352" width="20" height="20" class="tokm"/>
  <text x="1164" y="368" class="loss" text-anchor="start">&#8466;_pick</text>
  <text x="1164" y="388" class="note" text-anchor="start">InfoNCE vs same-task negatives</text>

  <!-- gate -->
  <text x="30" y="440" class="note">gate (metric, not a loss):  A = &#8466;_retro(M_prior) &#8722; &#8466;_retro(M_t)  must stay &gt; 0 and grow &#8212; episode content beyond the template floor</text>
</svg>
