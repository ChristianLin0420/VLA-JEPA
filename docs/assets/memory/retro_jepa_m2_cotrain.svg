<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-labelledby="title">
  <title id="title">Retro-JEPA Stage M2: co-training the pretrained memory into VLA-JEPA</title>
  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="8" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333333"/>
    </marker>
    <style>
      .mod   { font: 700 17px Helvetica, Arial, sans-serif; fill: #1B2A3A; text-anchor: middle; }
      .sub   { font: 400 13px Helvetica, Arial, sans-serif; fill: #5B6573; text-anchor: middle; }
      .mathm { font: italic 600 16px Georgia, 'Times New Roman', serif; fill: #1B2A3A; text-anchor: middle; }
      .loss  { font: italic 700 16px Georgia, 'Times New Roman', serif; fill: #B4531B; }
      .note  { font: 400 13px Helvetica, Arial, sans-serif; fill: #5B6573; }
      .cap   { font: 700 15px Helvetica, Arial, sans-serif; fill: #1B2A3A; }
      .frozen    { fill: #F0F3F7; stroke: #6B7A8D; stroke-width: 1.4; }
      .trainable { fill: #FDEBD7; stroke: #C87B2E; stroke-width: 1.4; }
      .flow  { fill: none; stroke: #333333; stroke-width: 1.6; marker-end: url(#ah2); }
      .sg    { fill: none; stroke: #6B7A8D; stroke-width: 1.4; stroke-dasharray: 5 4; marker-end: url(#ah2); }
      .tokv  { fill: #DCE9F5; stroke: #6B7A8D; stroke-width: 1; }
      .tokm  { fill: #E7EAEE; stroke: #6B7A8D; stroke-width: 1; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="600" fill="#FFFFFF"/>
  <text x="30" y="34" class="cap">Stage M2 &#183; co-training into VLA-JEPA &#8212; BC and retrodiction stay coupled</text>

  <!-- legend -->
  <rect x="1122" y="20" width="16" height="16" class="frozen"/>
  <text x="1146" y="33" class="note">frozen &#10052;</text>
  <rect x="1230" y="20" width="16" height="16" class="trainable"/>
  <text x="1254" y="33" class="note">trainable</text>

  <!-- inputs -->
  <rect x="40" y="112" width="96" height="70" rx="6" class="frozen"/>
  <rect x="52" y="124" width="96" height="70" rx="6" class="frozen"/>
  <rect x="64" y="136" width="96" height="70" rx="6" fill="#FFFFFF" stroke="#6B7A8D" stroke-width="1.4"/>
  <text x="112" y="176" class="mathm">x&#8321;&#8230;x_t</text>
  <text x="112" y="230" class="sub">burn-in 8 + supervised K=4</text>

  <rect x="40" y="290" width="130" height="52" rx="10" fill="#FFFFFF" stroke="#6B7A8D" stroke-width="1.4"/>
  <text x="105" y="322" class="mathm">&#8467;  (language)</text>

  <!-- encoders -->
  <path d="M164 150 H226" class="flow"/>
  <rect x="226" y="110" width="170" height="80" rx="10" class="frozen"/>
  <text x="311" y="144" class="mod">Encoder &#10052;</text>
  <text x="311" y="168" class="sub">V-JEPA2 ViT-L</text>

  <path d="M164 190 C 196 226 196 280 226 292" class="flow"/>
  <path d="M170 316 H226" class="flow"/>
  <rect x="226" y="276" width="170" height="80" rx="10" class="frozen"/>
  <text x="311" y="310" class="mod">Qwen3-VL &#10052;</text>
  <text x="311" y="334" class="sub">VLM backbone</text>

  <!-- memory -->
  <path d="M396 150 H410" class="flow" marker-end="none"/>
  <text x="414" y="138" class="mathm">z_i</text>
  <path d="M410 150 V96 H452" class="flow"/>
  <rect x="452" y="56" width="212" height="80" rx="10" class="trainable"/>
  <text x="558" y="90" class="mod">Memory  W</text>
  <text x="558" y="114" class="sub">init from M1 &#183; K=2 BPTT</text>
  <path d="M664 80 C 694 80 694 112 664 112" class="flow"/>

  <!-- R_t spine with two taps -->
  <path d="M664 96 H720 V470" class="flow" marker-end="none"/>
  <text x="700" y="84" class="mathm">R_t</text>
  <path d="M720 296 H770" class="flow"/>
  <path d="M720 470 H770" class="flow"/>

  <!-- policy tokens -->
  <path d="M396 316 C 560 316 560 316 770 316" class="flow"/>
  <text x="580" y="304" class="mathm">c_t  (policy tokens)</text>

  <!-- action expert -->
  <rect x="770" y="260" width="230" height="100" rx="10" class="trainable"/>
  <text x="885" y="296" class="mod">Action Expert (DiT)</text>
  <text x="885" y="320" class="sub">cross-attn: [ c_t &#8214; R_t ]</text>
  <text x="885" y="340" class="sub">native attention &#8212; no fusion valve</text>

  <path d="M1000 310 H1062" class="flow"/>
  <text x="1030" y="298" class="mathm">a_t</text>
  <text x="1072" y="306" class="loss" text-anchor="start">&#8466;_action</text>
  <text x="1072" y="328" class="note" text-anchor="start">flow matching &#183; clean frames only</text>
  <text x="1072" y="348" class="note" text-anchor="start">(act-blind masking removed)</text>

  <!-- retro branch: token row -->
  <rect x="452" y="437" width="22" height="22" class="tokv"/>
  <rect x="479" y="437" width="22" height="22" class="tokm"/>
  <line x1="479" y1="459" x2="501" y2="437" stroke="#6B7A8D" stroke-width="1"/>
  <rect x="506" y="437" width="22" height="22" class="tokm"/>
  <line x1="506" y1="459" x2="528" y2="437" stroke="#6B7A8D" stroke-width="1"/>
  <rect x="533" y="437" width="22" height="22" class="tokv"/>
  <rect x="560" y="437" width="22" height="22" class="tokv"/>
  <rect x="587" y="437" width="22" height="22" class="tokm"/>
  <line x1="587" y1="459" x2="609" y2="437" stroke="#6B7A8D" stroke-width="1"/>
  <text x="530" y="492" class="sub">masked burn-in tokens (as M1)</text>
  <path d="M410 150 V448 H452" class="sg"/>
  <path d="M609 448 H770" class="flow"/>

  <!-- retro predictor -->
  <rect x="770" y="410" width="230" height="80" rx="10" class="trainable"/>
  <text x="885" y="444" class="mod">Predictor (shared)</text>
  <text x="885" y="468" class="sub">retrodicts masked burn-in from M_t</text>

  <path d="M1000 450 H1062" class="flow"/>
  <text x="1030" y="438" class="mathm">z&#770;_i</text>
  <text x="1072" y="446" class="loss" text-anchor="start">&#8466;_retro + &#8466;_pick</text>
  <text x="1072" y="468" class="note" text-anchor="start">as Stage M1 &#183; targets sg(z_i) &#10052;</text>
  <text x="1072" y="488" class="note" text-anchor="start">stays ON during BC (anti-erasure)</text>

  <!-- footer -->
  <text x="30" y="545" class="note">total:  &#8466; = &#8466;_action + &#955;_r &#183;&#8466;_retro + &#955;_p &#183;&#8466;_pick &#8195;&#183;&#8195; schedule: 0&#8211;1K writer frozen (warmup) &#8594; 1K&#8211;10K joint, non-detached K=2</text>
  <text x="30" y="570" class="note">control: shuffled-state twin at the read &#8195;&#183;&#8195; gates @2.5K/5K: held-out state-swap endpoint + LIBERO-goal guardrail &#8195;&#183;&#8195; PASS: gap &#8805; 10&#8315;&#8308; (p&lt;0.01), control &#8776; 0</text>
</svg>
