<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc">
  <title id="title">Proposed post-Qwen memory bridge for VLA-JEPA</title>
  <desc id="desc">Current Qwen tokens read an explicit previous memory state. A mandatory policy fusion conditions DiT, an optional Stage 3 world fusion conditions the action-conditioned predictor, and memory writes occur only after prediction using current Qwen action markers and the previous state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#334155"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#3A7D78"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#C98B2E"/>
    </marker>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 28px Helvetica, Arial, sans-serif; fill: #16324F; }
      .subtitle { font: 400 15px Helvetica, Arial, sans-serif; fill: #5B6573; }
      .group { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.2; stroke-dasharray: 6 5; }
      .group-label { font: 700 14px Helvetica, Arial, sans-serif; letter-spacing: 1.2px; fill: #64748B; }
      .box { stroke-width: 1.6; filter: url(#softShadow); }
      .blue { fill: #EAF2F8; stroke: #2F6690; }
      .teal { fill: #E8F4F2; stroke: #3A7D78; }
      .amber { fill: #FFF4E1; stroke: #C98B2E; }
      .gray { fill: #F1F5F9; stroke: #64748B; }
      .white { fill: #FFFFFF; stroke: #94A3B8; }
      .label { font: 700 18px Helvetica, Arial, sans-serif; fill: #16324F; text-anchor: middle; }
      .small { font: 400 14px Helvetica, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .tiny { font: 400 12px Helvetica, Arial, sans-serif; fill: #64748B; text-anchor: middle; }
      .edge { fill: none; stroke: #334155; stroke-width: 1.8; marker-end: url(#arrow); }
      .mem-edge { fill: none; stroke: #3A7D78; stroke-width: 2.2; marker-end: url(#arrowTeal); }
      .dependency { fill: none; stroke: #C98B2E; stroke-width: 1.7; stroke-dasharray: 6 5; marker-end: url(#arrowAmber); }
      .edge-label { font: 600 12px Helvetica, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .badge { fill: #FFFFFF; stroke-width: 1.1; }
      .badge-text { font: 700 10px Helvetica, Arial, sans-serif; letter-spacing: 0.6px; text-anchor: middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="940" fill="#FFFFFF"/>
  <text x="800" y="42" class="title" text-anchor="middle">VLA-JEPA with an Explicit Hierarchical Memory Bridge</text>
  <text x="800" y="67" class="subtitle" text-anchor="middle">Read M_(t-1) before prediction; write current causal evidence only after prediction tensors are fixed</text>

  <rect x="28" y="92" width="500" height="760" rx="16" class="group"/>
  <text x="48" y="120" class="group-label">PERCEPTION AND LATENT ENCODING</text>
  <rect x="548" y="92" width="480" height="760" rx="16" class="group"/>
  <text x="568" y="120" class="group-label">EXPLICIT MEMORY BRIDGE</text>
  <rect x="1048" y="92" width="524" height="760" rx="16" class="group"/>
  <text x="1068" y="120" class="group-label">POLICY AND WORLD-MODEL CONSUMERS</text>

  <!-- Current perception -->
  <rect x="56" y="150" width="190" height="78" rx="10" class="box white"/>
  <text x="151" y="180" class="label">Current observation</text>
  <text x="151" y="205" class="small">camera views + task</text>

  <rect x="310" y="145" width="190" height="88" rx="10" class="box blue"/>
  <text x="405" y="179" class="label">Qwen3-VL</text>
  <text x="405" y="204" class="small">current-token encoder</text>
  <path d="M246 189 H310" class="edge"/>

  <!-- Causally safe Qwen outputs -->
  <rect x="585" y="142" width="210" height="92" rx="10" class="box blue"/>
  <text x="690" y="173" class="label">Embodied tokens E_t</text>
  <text x="690" y="199" class="small">policy stream</text>
  <text x="690" y="220" class="tiny">[B, 32, 2048]</text>
  <path d="M500 180 H585" class="edge"/>

  <rect x="585" y="270" width="210" height="92" rx="10" class="box blue"/>
  <text x="690" y="301" class="label">Action markers Z_t</text>
  <text x="690" y="327" class="small">safe query / write source</text>
  <text x="690" y="348" class="tiny">[B, 24, 2048]</text>
  <path d="M500 208 H540 V316 H585" class="edge"/>

  <!-- Previous state and read operation -->
  <rect x="585" y="410" width="210" height="112" rx="10" class="box teal"/>
  <text x="690" y="441" class="label">Previous state M_(t-1)</text>
  <text x="690" y="467" class="small">8 working slots</text>
  <text x="690" y="490" class="small">associative state</text>
  <text x="690" y="510" class="tiny">optional - Stage 2</text>

  <rect x="840" y="286" width="165" height="226" rx="10" class="box teal"/>
  <text x="922.5" y="319" class="label">Memory read</text>
  <line x1="860" y1="340" x2="985" y2="340" stroke="#A7D3CF" stroke-width="1"/>
  <text x="922.5" y="369" class="small">working-slot bank</text>
  <text x="922.5" y="395" class="small">associative query</text>
  <text x="922.5" y="417" class="tiny">optional - Stage 2</text>
  <text x="922.5" y="447" class="small">512-D bottleneck</text>
  <text x="922.5" y="478" class="tiny">R_t: [B, 8 or 9, 512]</text>
  <text x="922.5" y="498" class="tiny">read before write</text>
  <path d="M795 316 H840" class="mem-edge"/>
  <path d="M795 466 H840" class="mem-edge"/>

  <!-- Mandatory policy path -->
  <rect x="1068" y="142" width="192" height="102" rx="10" class="box teal"/>
  <rect x="1159" y="151" width="91" height="20" rx="8" class="badge" stroke="#C98B2E"/>
  <text x="1204.5" y="165" class="badge-text" fill="#C98B2E">MANDATORY</text>
  <text x="1164" y="183" class="label">Policy fusion</text>
  <text x="1164" y="210" class="small">zero-gated residual</text>
  <text x="1164" y="231" class="tiny">2048 - 512 - 2048</text>
  <path d="M795 188 H1068" class="edge"/>
  <path d="M1005 352 H1028 V220 H1068" class="mem-edge"/>

  <rect x="1300" y="148" width="126" height="92" rx="10" class="box amber"/>
  <text x="1363" y="182" class="label">DiT</text>
  <text x="1363" y="208" class="small">action head</text>
  <path d="M1260 194 H1300" class="edge"/>

  <rect x="1460" y="148" width="92" height="92" rx="10" class="box amber"/>
  <text x="1506" y="181" class="label">Action</text>
  <text x="1506" y="208" class="small">[B, 7, 7]</text>
  <path d="M1426 194 H1460" class="edge"/>

  <!-- Video encoder and explicitly separated world-model latents -->
  <rect x="56" y="525" width="190" height="78" rx="10" class="box white"/>
  <text x="151" y="555" class="label">Video window</text>
  <text x="151" y="580" class="small">8 frames x 2 views</text>

  <rect x="310" y="515" width="190" height="98" rx="10" class="box gray"/>
  <text x="405" y="548" class="label">V-JEPA encoder</text>
  <text x="405" y="574" class="small">frozen - no gradient</text>
  <text x="405" y="596" class="tiny">[B, 1024, 2048]</text>
  <path d="M246 564 H310" class="edge"/>

  <rect x="300" y="674" width="200" height="72" rx="10" class="box gray"/>
  <text x="400" y="703" class="label">Context latents</text>
  <text x="400" y="729" class="tiny">[B, 768, 2048]</text>
  <path d="M380 613 V654 H400 V674" class="edge"/>

  <rect x="300" y="765" width="200" height="72" rx="10" class="box gray"/>
  <text x="400" y="794" class="label">Target latents</text>
  <text x="400" y="820" class="tiny">[B, 768, 2048]</text>
  <path d="M430 613 V648 H518 V801 H500" class="edge"/>

  <!-- Optional Stage 3 world conditioning -->
  <rect x="1068" y="510" width="192" height="106" rx="10" class="box teal"/>
  <rect x="1123" y="519" width="127" height="20" rx="8" class="badge" stroke="#3A7D78"/>
  <text x="1186.5" y="533" class="badge-text" fill="#3A7D78">OPTIONAL - STAGE 3</text>
  <text x="1164" y="554" class="label">World fusion</text>
  <text x="1164" y="580" class="small">zero-gated residual</text>
  <text x="1164" y="602" class="tiny">preserves 24-token contract</text>
  <path d="M795 336 H812 V548 H1050 V568 H1068" class="edge"/>
  <path d="M1005 448 H1036 V492 H1164 V510" class="mem-edge"/>

  <rect x="1300" y="510" width="126" height="106" rx="10" class="box blue"/>
  <text x="1363" y="548" class="label">AC predictor</text>
  <text x="1363" y="575" class="small">future latents</text>
  <text x="1363" y="598" class="tiny">[B, 768, 2048]</text>
  <path d="M1260 563 H1300" class="edge"/>

  <!-- Context has exactly one consumer: the AC predictor -->
  <path d="M500 710 H530 V628 H1280 V588 H1300" class="edge"/>
  <text x="830" y="620" class="edge-label">context payload</text>

  <rect x="1460" y="510" width="92" height="106" rx="10" class="box blue"/>
  <text x="1506" y="548" class="label">World</text>
  <text x="1506" y="572" class="label">L1 loss</text>
  <path d="M1426 548 H1442 V548 H1460" class="edge"/>

  <!-- Target has exactly one consumer: the world loss -->
  <path d="M500 801 H530 V838 H1440 V588 H1460" class="edge"/>
  <text x="970" y="831" class="edge-label">target payload [B, 768, 2048]</text>

  <!-- Post-decision write: exactly two payload inputs -->
  <rect x="840" y="680" width="165" height="116" rx="10" class="box teal"/>
  <text x="922.5" y="710" class="label">Memory write</text>
  <text x="922.5" y="737" class="small">payload: Z_t</text>
  <text x="922.5" y="759" class="small">+ M_(t-1)</text>
  <text x="922.5" y="781" class="tiny">no targets or predictions</text>

  <!-- Direct Qwen Z_t payload -->
  <path d="M620 362 H565 V656 H865 V680" class="mem-edge"/>
  <text x="650" y="648" class="edge-label">current causal Z_t</text>

  <!-- Previous-state payload -->
  <path d="M760 522 V540 H1020 V738 H1005" class="mem-edge"/>
  <text x="885" y="533" class="edge-label">previous state</text>

  <!-- Ordering event, deliberately not a tensor/payload edge -->
  <rect x="1068" y="648" width="300" height="50" rx="9" fill="#FFF9EE" stroke="#C98B2E" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="1218" y="669" class="edge-label" style="fill:#C98B2E; font-weight:700;">PREDICTIONS FORMED</text>
  <text x="1218" y="688" class="tiny" style="fill:#C98B2E;">ordering only &#8212; no payload</text>
  <path d="M1068 673 H1035 V704 H1005" class="dependency"/>

  <rect x="1068" y="726" width="210" height="74" rx="10" class="box teal"/>
  <text x="1173" y="756" class="label">Next state M_t</text>
  <text x="1173" y="781" class="small">explicit session state</text>
  <path d="M1005 762 H1068" class="mem-edge"/>

  <!-- Legend -->
  <rect x="316" y="880" width="20" height="14" fill="#EAF2F8" stroke="#2F6690"/>
  <text x="346" y="892" class="subtitle">model / token module</text>
  <rect x="565" y="880" width="20" height="14" fill="#E8F4F2" stroke="#3A7D78"/>
  <text x="595" y="892" class="subtitle">memory operation</text>
  <rect x="780" y="880" width="20" height="14" fill="#FFF4E1" stroke="#C98B2E"/>
  <text x="810" y="892" class="subtitle">policy output</text>
  <line x1="1007" y1="887" x2="1067" y2="887" stroke="#C98B2E" stroke-width="1.7" stroke-dasharray="6 5"/>
  <text x="1082" y="892" class="subtitle">ordering only - no payload</text>
</svg>
