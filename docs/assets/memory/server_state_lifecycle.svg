<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">Connection-local server memory state lifecycle</title>
  <desc id="desc">A WebSocket connection initializes connection-local memory and random generator state on reset. Inference computes a candidate state without mutating the committed state. Success atomically commits memory and random generator state, recoverable failure rolls both back, unrecoverable failure invalidates the session, explicit reset restores readiness, and disconnect deletes private state.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16324F"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3A7D78"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C98B2E"/>
    </marker>
    <style>
      .title { font: 700 28px Helvetica, Arial, sans-serif; fill: #16324F; letter-spacing: .2px; }
      .panel-title { font: 700 18px Helvetica, Arial, sans-serif; fill: #16324F; }
      .panel-subtitle { font: 400 13px Helvetica, Arial, sans-serif; fill: #5B6573; }
      .state-title { font: 700 17px Helvetica, Arial, sans-serif; fill: #16324F; }
      .state-title-white { font: 700 17px Helvetica, Arial, sans-serif; fill: #FFFFFF; }
      .state-body { font: 400 14px Helvetica, Arial, sans-serif; fill: #5B6573; }
      .state-body-white { font: 400 14px Helvetica, Arial, sans-serif; fill: #FFFFFF; }
      .edge-label { font: 600 13px Helvetica, Arial, sans-serif; fill: #5B6573; }
      .edge-label-teal { font: 600 13px Helvetica, Arial, sans-serif; fill: #3A7D78; }
      .edge-label-amber { font: 600 13px Helvetica, Arial, sans-serif; fill: #A76C18; }
      .small { font: 400 12.5px Helvetica, Arial, sans-serif; fill: #5B6573; }
      .panel { fill: #FBFCFD; stroke: #C7CED6; stroke-width: 1.4; }
      .state { fill: #FFFFFF; stroke: #2F6690; stroke-width: 1.9; }
      .state-teal { fill: #F1F8F7; stroke: #3A7D78; stroke-width: 1.9; }
      .state-amber { fill: #FFF8EC; stroke: #C98B2E; stroke-width: 1.9; }
      .state-navy { fill: #16324F; stroke: #16324F; stroke-width: 1.9; }
      .flow { fill: none; stroke: #16324F; stroke-width: 1.8; marker-end: url(#arrow); }
      .flow-teal { fill: none; stroke: #3A7D78; stroke-width: 1.9; marker-end: url(#arrowTeal); }
      .flow-amber { fill: none; stroke: #C98B2E; stroke-width: 1.9; marker-end: url(#arrowAmber); }
      .disconnect { fill: none; stroke: #5B6573; stroke-width: 1.5; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .boundary { fill: none; stroke: #AAB4BF; stroke-width: 1.3; stroke-dasharray: 7 5; }
    </style>
  </defs>

  <rect width="1680" height="980" fill="#FFFFFF"/>
  <text x="840" y="45" text-anchor="middle" class="title">Connection-local memory and RNG lifecycle</text>
  <line x1="620" y1="61" x2="1060" y2="61" stroke="#C98B2E" stroke-width="2"/>

  <rect x="35" y="86" width="1610" height="815" rx="12" class="panel"/>
  <text x="66" y="119" class="panel-title">Private state boundary · one active episode per WebSocket connection</text>
  <text x="66" y="141" class="panel-subtitle">Committed memory M and generator G are never serialized into the public response.</text>
  <rect x="57" y="160" width="1566" height="710" rx="10" class="boundary"/>

  <!-- Connection and reset -->
  <circle cx="103" cy="270" r="13" fill="#16324F"/>
  <path d="M 116 270 L 165 270" class="flow"/>
  <text x="103" y="304" text-anchor="middle" class="small">open</text>

  <rect x="165" y="218" width="205" height="104" rx="52" class="state"/>
  <text x="267.5" y="258" text-anchor="middle" class="state-title">Connected</text>
  <text x="267.5" y="282" text-anchor="middle" class="state-body">no live episode state</text>
  <text x="267.5" y="302" text-anchor="middle" class="state-body">await typed reset</text>

  <rect x="430" y="201" width="250" height="138" rx="8" class="state-amber"/>
  <text x="555" y="237" text-anchor="middle" class="state-title">Reset episode</text>
  <text x="555" y="263" text-anchor="middle" class="state-body">reset(episode_seed)</text>
  <line x1="455" y1="278" x2="655" y2="278" stroke="#E1C38E" stroke-width="1"/>
  <text x="555" y="301" text-anchor="middle" class="state-body">initialize M0</text>
  <text x="555" y="322" text-anchor="middle" class="state-body">initialize private G0</text>

  <path d="M 370 270 L 430 270" class="flow-amber"/>
  <text x="400" y="255" text-anchor="middle" class="edge-label-amber">reset</text>

  <!-- Ready and candidate transaction -->
  <rect x="755" y="201" width="245" height="138" rx="69" class="state-navy"/>
  <text x="877.5" y="245" text-anchor="middle" class="state-title-white">Ready</text>
  <text x="877.5" y="272" text-anchor="middle" class="state-body-white">committed snapshot</text>
  <text x="877.5" y="296" text-anchor="middle" class="state-body-white">S_t = (M_t, G_t)</text>
  <text x="877.5" y="319" text-anchor="middle" class="state-body-white">request boundary</text>

  <path d="M 680 270 L 755 270" class="flow-amber"/>
  <text x="717.5" y="255" text-anchor="middle" class="edge-label-amber">ready</text>

  <rect x="1120" y="190" width="305" height="160" rx="8" class="state-teal"/>
  <text x="1272.5" y="228" text-anchor="middle" class="state-title">Inference candidate</text>
  <text x="1272.5" y="254" text-anchor="middle" class="state-body">infer(observation, instruction)</text>
  <line x1="1148" y1="270" x2="1397" y2="270" stroke="#A9CFCC" stroke-width="1"/>
  <text x="1272.5" y="294" text-anchor="middle" class="state-body">public action_t</text>
  <text x="1272.5" y="316" text-anchor="middle" class="state-body">private candidate S* = (M*, G*)</text>
  <text x="1272.5" y="338" text-anchor="middle" class="state-body">S_t remains unchanged</text>

  <path d="M 1000 270 L 1120 270" class="flow-teal"/>
  <text x="1060" y="251" text-anchor="middle" class="edge-label-teal">infer</text>
  <text x="1060" y="291" text-anchor="middle" class="small">speculative compute</text>

  <!-- Transaction outcomes -->
  <path d="M 1272.5 350 L 1272.5 404 M 480 404 L 1320 404" fill="none" stroke="#AAB4BF" stroke-width="1.3"/>
  <circle cx="480" cy="404" r="5" fill="#16324F"/>

  <rect x="315" y="445" width="330" height="132" rx="8" class="state-teal"/>
  <circle cx="345" cy="475" r="12" fill="#3A7D78"/>
  <path d="M 339 475 L 344 480 L 352 469" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="480" y="480" text-anchor="middle" class="state-title">Atomic commit</text>
  <text x="480" y="510" text-anchor="middle" class="state-body">success: publish action_t</text>
  <text x="480" y="534" text-anchor="middle" class="state-body">replace M_t and G_t together</text>
  <text x="480" y="556" text-anchor="middle" class="state-body">S_next = S*</text>

  <rect x="735" y="445" width="330" height="132" rx="8" class="state-amber"/>
  <circle cx="765" cy="475" r="12" fill="#C98B2E"/>
  <path d="M 759 475 L 771 475 M 765 469 L 765 481" stroke="#FFFFFF" stroke-width="2.1" stroke-linecap="round"/>
  <text x="900" y="480" text-anchor="middle" class="state-title">Rollback</text>
  <text x="900" y="510" text-anchor="middle" class="state-body">recoverable failure</text>
  <text x="900" y="534" text-anchor="middle" class="state-body">discard M* and G*</text>
  <text x="900" y="556" text-anchor="middle" class="state-body">retain prior S_t</text>

  <rect x="1155" y="445" width="330" height="132" rx="8" class="state"/>
  <circle cx="1185" cy="475" r="12" fill="#5B6573"/>
  <path d="M 1179 469 L 1191 481 M 1191 469 L 1179 481" stroke="#FFFFFF" stroke-width="2.1" stroke-linecap="round"/>
  <text x="1320" y="480" text-anchor="middle" class="state-title">Invalid</text>
  <text x="1320" y="510" text-anchor="middle" class="state-body">unrecoverable failure</text>
  <text x="1320" y="534" text-anchor="middle" class="state-body">reject further infer requests</text>
  <text x="1320" y="556" text-anchor="middle" class="state-body">require explicit reset</text>

  <path d="M 480 404 L 480 445" class="flow-teal"/>
  <path d="M 900 404 L 900 445" class="flow-amber"/>
  <path d="M 1320 404 L 1320 445" class="flow"/>
  <text x="494" y="430" class="edge-label-teal">success</text>
  <text x="914" y="430" class="edge-label-amber">failure · recoverable</text>
  <text x="1334" y="430" class="edge-label">failure · unrecoverable</text>

  <!-- Successful commit and recoverable rollback both return to Ready. -->
  <path d="M 480 577 L 480 630 L 690 630" fill="none" stroke="#3A7D78" stroke-width="1.9"/>
  <path d="M 900 577 L 900 630 L 690 630" fill="none" stroke="#C98B2E" stroke-width="1.9"/>
  <circle cx="690" cy="630" r="5" fill="#16324F"/>
  <path d="M 690 630 L 75 630 L 75 365 L 720 365 L 720 270 L 755 270" class="flow"/>
  <text x="295" y="352" text-anchor="middle" class="edge-label">return to Ready · committed S_next or restored S_t</text>

  <!-- An invalid session can only re-enter through the reset operation. -->
  <path d="M 1485 500 L 1580 500 L 1580 175 L 555 175 L 555 201" class="flow-amber"/>
  <text x="1180" y="168" text-anchor="middle" class="edge-label-amber">explicit reset(episode_seed)</text>

  <!-- Disconnect and cleanup -->
  <rect x="690" y="746" width="375" height="91" rx="8" class="state-navy"/>
  <text x="877.5" y="780" text-anchor="middle" class="state-title-white">Disconnect cleanup</text>
  <text x="877.5" y="807" text-anchor="middle" class="state-body-white">delete memory, generator, and episode metadata</text>

  <!-- Dashed teardown edges are valid from Ready and Invalid. -->
  <path d="M 1000 320 L 1100 320 L 1100 710 L 900 710 L 900 746" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <path d="M 1000 320 L 1100 320 L 1100 710 L 900 710 L 900 746" class="disconnect"/>
  <text x="1115" y="662" transform="rotate(-90 1115 662)" text-anchor="middle" class="edge-label">disconnect</text>
  <path d="M 1485 550 L 1540 550 L 1540 791 L 1065 791" class="disconnect"/>
  <text x="1525" y="750" text-anchor="end" class="edge-label">disconnect</text>

  <path d="M 1065 817 L 1134 817" class="flow"/>
  <circle cx="1154" cy="817" r="19" fill="#FFFFFF" stroke="#16324F" stroke-width="1.8"/>
  <circle cx="1154" cy="817" r="11" fill="#16324F"/>
  <text x="1154" y="851" text-anchor="middle" class="small">closed</text>

  <rect x="80" y="910" width="1520" height="44" rx="7" fill="#F4F7F9" stroke="#D9DEE4" stroke-width="1"/>
  <text x="840" y="938" text-anchor="middle" class="panel-subtitle">Transactional invariant: a request commits memory and RNG together, or changes neither.</text>
</svg>
